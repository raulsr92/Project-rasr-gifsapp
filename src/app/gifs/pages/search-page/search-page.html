<main>
  <h2 class="text-2xl font-bold mt-5">Buscar Gifs</h2>
  <h3 class="text-sm text-gray-500">Buscar gifs por nombre, descripción o tags</h3>

  <section class="flex flex-col gap-4 w-[70%]">

    <input
      type="text"
      placeholder="Buscar gifs"
      class="mt-3 border border-gray-600 rounded-md px-3 py-1 bg-white"
      (keyup.enter)="onSearch(txtSearch.value)"
      #txtSearch
    >

  </section>

  <!--Muestra de resultados de los gif-->

  <section class="mt-4 mb-5">
    <app-gifs-list [imagenUrls]="searchedGifs()"></app-gifs-list>
  </section>

</main>
